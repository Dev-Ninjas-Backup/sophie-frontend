name: Automate Build & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs: 
  ci-check:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: ci-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: softvence/adelbenali-admin:latest
          cache-from: type=registry,ref=softvence/sophie-frontend:buildcache
          cache-to: type=registry,ref=softvence/sophie-frontend:buildcache,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd ~/frontend
            
            # Pull latest image
            docker compose pull
            
            # Stop and remove old containers
            docker compose down --remove-orphans
            
            # Start new containers
            docker compose up -d
            
            echo "⏳ Waiting for service to start..."
            sleep 15
            
            # Check container status (adjust container name to match yours)
            if docker compose ps | grep -q "Up"; then
              echo "✅ Deployment successful!..."
              docker compose logs --tail=30
            else
              echo "❌ Deployment failed!"
              docker compose logs --tail=100
              exit 1
            fi
            
            # Cleanup old images (be careful with this)
            docker image prune -f --filter "until=24h"